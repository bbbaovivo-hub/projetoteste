<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detector de Imagem Imprópria</title>

<style>

body{
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1c1c1c;
padding:30px;
border-radius:10px;
text-align:center;
width:360px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2{
margin-bottom:15px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
background:#6366f1;
color:white;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

button:hover{
opacity:0.9;
}

#preview{
margin-top:15px;
max-width:200px;
border-radius:8px;
display:none;
}

#resultado{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Verificar imagem</h2>

<input type="file" id="imagem" accept="image/*">

<br>

<img id="preview">

<br>

<button id="btnVerificar">Analisar imagem</button>

<div id="resultado"></div>

</div>

<script>

const inputImagem = document.getElementById("imagem");
const preview = document.getElementById("preview");
const resultado = document.getElementById("resultado");
const btn = document.getElementById("btnVerificar");

inputImagem.addEventListener("change", () => {

const file = inputImagem.files[0];
if(!file) return;

preview.src = URL.createObjectURL(file);
preview.style.display = "block";

});

btn.addEventListener("click", verificarImagem);

async function verificarImagem(){

const file = inputImagem.files[0];

if(!file){
alert("Selecione uma imagem primeiro");
return;
}

resultado.innerText = "Analisando imagem...";

const reader = new FileReader();

reader.onload = async function(){

const base64 = reader.result.split(",")[1];

try{

const response = await fetch("/.netlify/functions/verificar",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({image:base64})
});

if(!response.ok){
throw new Error("Erro no servidor");
}

const data = await response.json();

console.log(data);
resultado.innerText = JSON.stringify(data, null, 2);
  
const nudez = data.nudity || {};
const gore = data.gore || {};

const nudeScore = Math.max(
nudez.sexual_activity || 0,
nudez.sexual_display || 0,
nudez.erotica || 0
);

const goreScore = gore.prob || 0;

if(nudeScore > 0.6 || goreScore > 0.6){

resultado.innerHTML = "❌ Imagem imprópria detectada";

}else{

resultado.innerHTML = "✅ Imagem permitida";

}

}catch(error){

console.error(error);
resultado.innerHTML = "⚠️ Erro ao conectar com o servidor";

}

};

reader.readAsDataURL(file);

}

</script>

</body>
  </html>
