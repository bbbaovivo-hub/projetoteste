<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Detector de Imagem Imprópria</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1c1c1c;
padding:30px;
border-radius:10px;
text-align:center;
width:360px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2{
margin-bottom:15px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
background:#6366f1;
color:white;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

button:hover{
opacity:0.9;
}

#preview{
margin-top:15px;
max-width:200px;
border-radius:8px;
display:none;
}

#resultado{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Verificar imagem</h2>

<input type="file" id="imagem" accept="image/*">

<br>

<img id="preview">

<br>

<button onclick="verificarImagem()">Analisar imagem</button>

<div id="resultado"></div>

</div>

<script>

const inputImagem = document.getElementById("imagem");
const preview = document.getElementById("preview");
const resultado = document.getElementById("resultado");

inputImagem.addEventListener("change", () => {

const file = inputImagem.files[0];

if(!file) return;

preview.src = URL.createObjectURL(file);
preview.style.display = "block";

});

async function verificarImagem(){

const file = inputImagem.files[0];

if(!file){

alert("Selecione uma imagem primeiro");
return;

}

resultado.innerText = "Analisando imagem...";

const formData = new FormData();
formData.append("media", file);

try{

const response = await fetch("/api/verificar",{
method:"POST",
body:formData
});

const data = await response.json();

console.log(data);

let nudez = data.nudity;
let gore = data.gore;

let nudeScore = Math.max(
nudez.sexual_activity,
nudez.sexual_display,
nudez.erotica
);

let goreScore = gore.prob;

if(nudeScore > 0.6 || goreScore > 0.6){

resultado.innerHTML = "❌ Imagem imprópria detectada";

}else{

resultado.innerHTML = "✅ Imagem permitida";

}

}catch(error){

console.error(error);
resultado.innerHTML = "⚠️ Erro ao conectar com o servidor";

}

}

</script>

</body>
</html>
